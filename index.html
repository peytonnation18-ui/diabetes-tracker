<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniMed 780G Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pulse-green { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        body { background-color: #0d1117; color: #c9d1d9; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
            <h1 class="text-2xl font-bold text-blue-400">MiniMed 780G Tracker</h1>
            <div id="connection-status" class="flex items-center gap-2 text-sm text-gray-400">
                <span id="status-dot" class="h-3 w-3 rounded-full bg-red-500"></span>
                <span id="status-text">Disconnected</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg text-center">
                <p class="text-gray-400 text-sm uppercase mb-2">Current Glucose</p>
                <div id="bg-value" class="text-6xl font-black text-white">--</div>
                <div id="bg-trend" class="text-2xl text-blue-400 mt-2">--</div>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <p class="text-gray-400 text-sm uppercase mb-4">Live Feed</p>
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between"><span>Next update:</span><span id="next-update" class="text-white">--</span></div>
                    <div class="flex justify-between"><span>Delta:</span><span id="delta-val" class="text-white">--</span></div>
                    <div class="flex justify-between"><span>Last Sync:</span><span id="last-sync" class="text-white">--</span></div>
                </div>
            </div>
            <div id="error-box" class="hidden bg-red-900/30 border border-red-500 p-6 rounded-xl text-red-200">
                <p class="font-bold">Connection Issue</p>
                <p id="error-msg" class="text-sm mt-2">Attempting to wake up server...</p>
                <button onclick="wakeServer()" class="mt-4 bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded text-xs">Force Retry</button>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
            <h2 class="text-lg font-bold mb-4 border-b border-gray-700 pb-2">Settings</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Nightscout URL</label>
                    <input id="ns-url" type="text" value="https://cgm-remote-monitor-qb91.onrender.com" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">API Secret</label>
                    <input id="ns-secret" type="password" value="Tracker2024!!" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm">
                </div>
            </div>
            <button onclick="connect()" class="mt-4 bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded font-bold transition">Save & Connect</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            url: "https://cgm-remote-monitor-qb91.onrender.com",
            pingInterval: 300000 // 5 minutes
        };

        // 1. THE WAKE-UP SCRIPT
        // This pings Render to keep it from sleeping while the tab is open.
        async function wakeServer() {
            console.log("Pinging Render server to keep it awake...");
            try {
                // We use 'no-cors' to bypass security blocks just for the ping
                await fetch(CONFIG.url, { mode: 'no-cors' });
                console.log("Server heartbeat sent.");
            } catch (e) {
                console.log("Server is still cold-starting...");
            }
        }

        // 2. DATA FETCHING LOGIC
        async function connect() {
            const url = document.getElementById('ns-url').value.replace(/\/$/, "");
            const secret = document.getElementById('ns-secret').value;
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const errorBox = document.getElementById('error-box');

            statusText.innerText = "Connecting...";
            
            try {
                const response = await fetch(`${url}/api/v1/entries/sgv.json?count=1`);
                
                if (response.status === 502) {
                    throw new Error("Server is sleeping (502). Wait 60s and try again.");
                }

                if (!response.ok) throw new Error("Connection failed");

                const data = await response.json();
                updateUI(data[0]);
                
                // Success State
                statusDot.className = "h-3 w-3 rounded-full bg-green-500 pulse-green";
                statusText.innerText = "Live Connected";
                errorBox.classList.add('hidden');
            } catch (err) {
                console.error(err);
                statusDot.className = "h-3 w-3 rounded-full bg-red-500";
                statusText.innerText = "Error";
                errorBox.classList.remove('hidden');
                document.getElementById('error-msg').innerText = err.message;
            }
        }

        function updateUI(entry) {
            if (!entry) return;
            document.getElementById('bg-value').innerText = entry.sgv;
            document.getElementById('last-sync').innerText = new Date(entry.date).toLocaleTimeString();
            // Trend Arrow Logic
            const trends = { 0: "No Trend", 1: "⬆️ Double Up", 2: "⬆️ Single Up", 3: "↗️ Slight Up", 4: "➡️ Flat", 5: "↘️ Slight Down", 6: "⬇️ Single Down", 7: "⬇️ Double Down" };
            document.getElementById('bg-trend').innerText = trends[entry.trend] || "Flat";
        }

        // Run wake-up immediately and then every 5 minutes
        wakeServer();
        setInterval(wakeServer, CONFIG.pingInterval);
        
        // Auto-refresh data every 5 minutes
        setInterval(connect, 300000);
    </script>
</body>
</html>
